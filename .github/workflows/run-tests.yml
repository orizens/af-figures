name: Test App

on:
  push:
    # branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13 # pin version

      - name: Cache bun modules
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-bun-modules
        with:
            path: node_modules
            key: ${{ runner.os }}-modules-${{ env.cache-name }}-${{ hashFiles('bun.lock') }}
            restore-keys: |
              ${{ runner.os }}-modules-${{ env.cache-name }}-
              ${{ runner.os }}-modules-

      - name: Install dependencies
        # if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

  install_playwright:
    runs-on: ubuntu-latest
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun modules
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-bun-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ env.cache-name }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-${{ env.cache-name }}-
            ${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bunx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

  e2e_tests_preview:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Install Playwright
      run: bunx playwright install chromium --with-deps

    - name: Run Playwright tests
      id: playwright
      continue-on-error: true
      run: bunx playwright test
    
    - name: Generate HTML report
      if: always()
      run: |
        if [ -d "blob-report" ]; then
          bunx playwright merge-reports --reporter html ./blob-report
        else
          echo "blob-report directory not found"
          exit 1
        fi

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
        if-no-files-found: error
        retention-days: 2

    - name: Fail if tests failed
      if: steps.playwright.outcome == 'failure'
      run: exit 1
    - name: Print playwright exit code
      if: always()
      run: |
        echo "Outcome: ${{ steps.playwright.outcome }}"

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache bun modules
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-bun-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ env.cache-name }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-modules-${{ env.cache-name }}-
            ${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test:unit
